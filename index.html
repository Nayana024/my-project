<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>L&T Login</title>
 
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;                                                                                                                                                    
font-family:Arial, Helvetica, sans-serif;
}
 
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f4c81,#1ea1d3);
}
 
/* LOGIN CARD */
 
.login-container{
background:white;
padding:40px;
width:500px;
border-radius:12px;                    
box-shadow:0 12px 25px rgba(0,0,0,0.2);
text-align:center;
animation:fadeIn 0.6s ease;
}
 
/* LOGO */
 
.logo{
width:300px;
margin-bottom:10px;
}
 
/* TITLE */
 
h2{
margin-bottom:20px;
color:#333;
}
 
/* LABELS */
 
label{
display:block;
text-align:left;                
font-weight:bold;
margin-top:12px;
margin-bottom:4px;
}
 
/* INPUTS */
 
input[type="email"],
input[type="password"]{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
outline:none;
transition:0.2s;
}
 
input:focus{
border-color:#2e5bff;
}
 
/* PASSWORD BOX */
 
.password-box{
position:relative;
width:100%;
}
 
.password-box input{
width:100%;
padding:10px;
padding-right:45px;
border-radius:6px;
border:1px solid #ccc;
}
 
.password-box button{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
border:none;
background:transparent;
cursor:pointer;
font-size:16px;
}
 
 
/* OPTIONS ROW */
 
.options{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:12px;
font-size:14px;
}
 
/* REMEMBER ME */
 
.remember{
display:flex;
align-items:center;
gap:6px;
font-weight:normal;
}
 
/* FORGOT PASSWORD */
 
.options a{
text-decoration:none;
color:#2e5bff;
}
 
.options a:hover{
text-decoration:underline;
}
 
/* LOGIN BUTTON */
 
button.login-btn{
width:100%;
padding:12px;
margin-top:18px;
border:none;
border-radius:6px;
background:#2e5bff;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
}
 
button.login-btn:hover{
background:#1f46d1;
transform:translateY(-1px);
}
 
/* ANIMATION */
 
@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}
 
</style>
 
</head>
 
<body>
 
<div class="login-container">
 
<img src="lt_logo.png" class="logo" alt="L&T Logo">
 
<h2>Sign-in</h2>
 
<form onsubmit="return loginUser()">
 
<label>Email</label>
 
<input type="email"
value="nayana.gm_ext@Ltts.com"
placeholder="Enter Email"
required>
 
 
<label>Password</label>
 
<div class="password-box">
 
<input type="password"
id="password"
value="Password@123"
required>
 
<button type="button" onclick="togglePassword()">👁</button>
 
</div>
 
 
<div class="options">
 
<label class="remember">
<input type="checkbox">
<span>Remember Me</span>
</label>
 
<a href="#"
onclick="forgotPassword()">Forgot Password?
</a>
 
</div>
 
 
<button class="login-btn" type="submit">
Login
</button>
 
</form>
 
</div>
 
 
<script>
 
 
function togglePassword(){
 
var password = document.getElementById("password");
 
if(password.type === "password"){
password.type = "text";
}
else{
password.type = "password";
}
 
}
 
function forgotPassword(){
 
var email = prompt("Enter your registered email:");
 
if(email === "nayana.gm_ext@Ltts.com" || email === "nayana.gm_ext@Ltts.com"){
 
var newPassword = prompt("Enter your new password:");
 
if(newPassword){
alert("Password changed successfully!");
}
 
}
 
else{
alert("Email not found!");
}
 
}
function loginUser(){
 
var email = document.querySelector("input[type='email']").value;
var password = document.getElementById("password").value;
 
if(email === "nayana.gm_ext@Ltts.com" && password === "Password@123"){
 
window.location.href = "landing.html";
return false;
 
}
 
else{
 
alert("Invalid Login");
return false;  
 
}
 
}
 
</script>
 
</body>
</html>
